<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><title>JS Recon — API Map</title>
<script src="theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0E16; --panel:#111726; --panel-2:#0E131F; --line:#1E2736; --line-soft:#161D2B;
    --signal:#3DD9EB; --wan:#FF6B9D; --current:#FFC24B; --red:#F85149;
    --text:#E7EDF6; --muted:#7C8AA0; --dim:#46536A; --done:#4FD18B;
    --display:'Space Grotesk',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --grad1:rgba(255,107,157,.06); --grad2:rgba(61,217,235,.07);
  }
  :root[data-theme="light"]{
    --ink:#F4F6FB; --panel:#FFFFFF; --panel-2:#EEF2F8; --line:#D7DEEA; --line-soft:#E3E9F2;
    --signal:#0E9BB5; --wan:#D6286F; --current:#B07A12; --red:#D33A33;
    --text:#0E1726; --muted:#56657C; --dim:#93A0B4; --done:#1E9E5E;
    --grad1:rgba(214,40,111,.05); --grad2:rgba(14,155,181,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, var(--grad1), transparent 60%),
      radial-gradient(1000px 700px at 0% 0%, var(--grad2), transparent 55%),
      var(--ink);
    color:var(--text); font-family:var(--mono); min-height:100vh; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:28px 22px 60px;}

  .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:8px;}
  .blink{color:var(--signal);animation:blink 1.6s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25}}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(24px,4vw,38px);letter-spacing:-.02em;margin:0;line-height:1.04;}
  h1 .dest{color:var(--signal);}
  .sub{color:var(--muted);font-size:13px;margin-top:10px;max-width:70ch;}

  .stats{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;}
  .stat{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:12px;padding:10px 16px;min-width:110px;}
  .stat .n{font-family:var(--display);font-weight:700;font-size:22px;color:var(--signal);}
  .stat .l{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-top:2px;}
  .stat.wan .n{color:var(--wan);}

  .controls{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:200px;background:var(--ink);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:13px;padding:10px 14px;border-radius:8px;transition:.2s;}
  .search:focus{outline:none;border-color:var(--signal);box-shadow:0 0 0 3px rgba(61,217,235,.12);}
  .search::placeholder{color:var(--dim);}
  .btn{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:9px 13px;cursor:pointer;transition:.2s;white-space:nowrap;}
  .btn:hover{border-color:var(--signal);color:var(--signal);}
  .btn.primary{color:var(--signal);border-color:var(--signal);}
  .btn.danger:hover{border-color:var(--wan);color:var(--wan);}

  .layout{display:grid;grid-template-columns:268px 1fr;gap:24px;margin-top:26px;align-items:start;}
  .rail-head{font-family:var(--display);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);margin:0 0 14px;}
  .rail{display:flex;flex-direction:column;gap:6px;max-height:74vh;overflow:auto;}
  .host{display:flex;gap:12px;align-items:flex-start;border:1px solid transparent;background:none;color:inherit;text-align:left;font-family:var(--mono);cursor:pointer;padding:9px 11px;border-radius:10px;transition:.2s;}
  .host:hover{background:var(--panel-2);}
  .host .dot{width:9px;height:9px;border-radius:50%;flex:none;margin-top:5px;background:var(--dim);transition:.2s;}
  .host.sel{background:var(--panel);border-color:var(--line);}
  .host.sel .dot{background:var(--signal);box-shadow:0 0 10px rgba(61,217,235,.6);}
  .host .name{font-family:var(--display);font-weight:600;font-size:13px;color:var(--text);word-break:break-all;line-height:1.2;}
  .host .meta{font-size:10.5px;color:var(--dim);margin-top:3px;}
  .host .meta .s{color:var(--wan);}

  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:22px 24px;min-height:60vh;}
  .panel-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;border-bottom:1px solid var(--line-soft);padding-bottom:14px;margin-bottom:6px;}
  .panel-id{font-family:var(--display);font-weight:700;font-size:12px;color:var(--signal);letter-spacing:.04em;}
  .panel-name{font-family:var(--display);font-weight:700;font-size:clamp(18px,2.4vw,24px);letter-spacing:-.01em;margin:0;word-break:break-all;}
  .section-head{font-family:var(--display);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);margin:22px 0 10px;}

  .row{display:flex;gap:12px;align-items:flex-start;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:7px;}
  .row .path{font-family:var(--mono);font-size:13px;color:var(--text);word-break:break-all;}
  .row .rmeta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .m{font-weight:600;font-size:10.5px;letter-spacing:.04em;padding:2px 7px;border-radius:6px;border:1px solid currentColor;}
  .m-GET{color:#6db3ff}.m-POST{color:var(--done)}.m-PUT,.m-PATCH{color:var(--current)}.m-DELETE{color:var(--red)}.m-OPT{color:var(--muted)}
  .methods{display:flex;gap:5px;flex-wrap:wrap;flex:none;}
  .tag{font-size:10px;padding:1px 7px;border-radius:6px;border:1px solid var(--line);color:var(--muted);}
  .tag.obs{color:var(--done);border-color:rgba(79,209,139,.4);} .tag.js{color:var(--wan);border-color:rgba(255,107,157,.4);}
  .chip{font-size:11px;color:var(--signal);background:rgba(61,217,235,.07);border:1px solid rgba(61,217,235,.22);border-radius:6px;padding:2px 8px;font-family:var(--mono);}

  .cert{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;}
  .cert-badge{font-family:var(--display);font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:4px;}
  .cert-sample{font-family:var(--mono);font-size:12px;margin:6px 0 4px;word-break:break-all;}
  .cert-sample code{background:var(--ink);border:1px solid var(--line);padding:2px 7px;border-radius:6px;}
  .cert-note{font-size:11.5px;color:var(--dim);word-break:break-all;}
  .sev{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.06em;text-transform:uppercase;}
  .sev.high{background:rgba(248,81,73,.14);color:var(--red);} .sev.medium{background:rgba(255,194,75,.15);color:var(--current);} .sev.info{background:rgba(61,217,235,.13);color:var(--signal);}
  .empty{color:var(--muted);padding:40px;text-align:center;font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow"><span class="blink">●</span> JS RECON // PASSIVE API MAPPER</p>
  <h1>API <span class="dest">Map</span></h1>
  <p class="sub">Endpoints and secrets discovered from JavaScript and observed traffic as you browse. Pick a host, then export an OpenAPI spec, a Postman collection, or a URL list.</p>

  <div class="stats">
    <div class="stat"><div class="n" id="sHosts">0</div><div class="l">Hosts</div></div>
    <div class="stat"><div class="n" id="sEndpoints">0</div><div class="l">Endpoints</div></div>
    <div class="stat wan"><div class="n" id="sSecrets">0</div><div class="l">Secrets</div></div>
  </div>

  <div class="controls">
    <input class="search" id="search" placeholder="filter endpoints…">
    <button class="btn primary" id="export">Export OpenAPI</button>
    <button class="btn" id="postman">Postman</button>
    <button class="btn" id="copyUrls">Copy URLs</button>
    <button class="btn" id="exportAll">Export all</button>
    <button class="btn" id="refresh">Refresh</button>
    <button class="btn" id="theme">◐ Theme</button>
    <button class="btn danger" id="clear">Clear</button>
  </div>

  <div class="layout">
    <div>
      <p class="rail-head">Hosts</p>
      <div class="rail" id="hosts"></div>
    </div>
    <div class="panel" id="content"><div class="empty">Browse with collecting on, then pick a host.</div></div>
  </div>
</div>
<script src="viewer.js"></script>
</body>
</html>
